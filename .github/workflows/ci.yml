name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aethercore:
    name: AetherCore build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift build (AetherCore)
        working-directory: AetherCore
        run: swift build

  app-tests:
    name: App build + AetherTests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -switch "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Environment (debug)
        run: |
          xcodebuild -showsdks | grep -i ios || true
          xcrun simctl list devices available | grep -i iphone || true

      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          DEVICE=$(xcrun simctl list devices available --json \
            | python3 -c "import sys,json;d=json.load(sys.stdin)['devices'];import re;
ios=[k for k in d if 'iOS' in k];
cands=[x['name'] for k in ios for x in d[k] if x.get('isAvailable') and 'iPhone' in x['name']];
print(cands[-1] if cands else 'iPhone 16')")
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project Aether.xcodeproj \
            -scheme Aether \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
