name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aethercore:
    name: AetherCore build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -switch "$LATEST"; fi
          swift --version
      - name: swift build (AetherCore)
        working-directory: AetherCore
        run: swift build

  app-tests:
    name: App build + AetherTests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -switch "$LATEST"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # VLCKit is a vendored binary (~2.4 GB) the app links but doesn't commit;
      # cache it across runs and fetch on a miss before generating the project.
      - name: Cache VLCKit
        uses: actions/cache@v4
        with:
          path: Vendor/VLCKit/VLCKit.xcframework
          key: vlckit-4.0.0a19
      - name: Fetch VLCKit
        run: ./scripts/fetch_vlckit.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Environment (debug)
        run: |
          xcodebuild -showsdks | grep -i ios || true
          xcrun simctl list devices available | grep -i iphone || true

      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9][0-9A-Za-z ]*' | head -1 | sed 's/[[:space:]]*$//')
          DEVICE=${DEVICE:-iPhone 16}
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project Aether.xcodeproj \
            -scheme Aether \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

  # Compile-only builds for the platforms the iOS test job doesn't cover, so
  # visionOS / tvOS-only code (immersive cinema, focus sections, gated SwiftUI
  # APIs) can't pass iOS CI green and then break the Xcode Cloud archive.
  # Generic simulator destinations avoid pinning to a specific device name.
  platform-builds:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        platform: [visionOS, tvOS]
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -switch "$LATEST"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # VLCKit is a vendored binary (~2.4 GB) the app links but doesn't commit;
      # cache it across runs and fetch on a miss before generating the project.
      - name: Cache VLCKit
        uses: actions/cache@v4
        with:
          path: Vendor/VLCKit/VLCKit.xcframework
          key: vlckit-4.0.0a19
      - name: Fetch VLCKit
        run: ./scripts/fetch_vlckit.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (${{ matrix.platform }} Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Aether.xcodeproj \
            -scheme Aether \
            -destination "generic/platform=${{ matrix.platform }} Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
