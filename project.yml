name: Aether

options:
  bundleIdPrefix: cz.zmrhal.aether
  createIntermediateGroups: true
  generateEmptyDirectories: true
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
    visionOS: "26.0"
    # Native macOS target (#232) — player-first Mac app. macOS 26 minimum: the
    # Homebrew/Xcode-Cloud libmpv dylib is built for the 26 SDK (linking it at a
    # lower target warns), and the app uses the modern SwiftUI stack the other
    # platforms target at 26. Separate target (not a destination on the iOS
    # target) because the iOS UI is UIKit-family; the Mac app is its own AppKit/
    # SwiftUI shell.
    macOS: "26.0"
  groupSortPosition: top
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_BARE_SLASH_REGEX_LITERALS: YES
    # NO so the "Stamp git commit" post-build script can run `git` against the
    # checked-out repo. With sandboxing ON, the script can't read `.git`, so
    # `git rev-parse` returns empty and every build stamps "dev" (→ Settings
    # shows the useless CFBundleVersion "1" locally). The only script phase is
    # the git stamp; the trade-off is acceptable for a clear build identifier.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    # Extract SwiftUI string literals (Text/Button/navigationTitle/…, which are
    # LocalizedStringKey) into Localizable.xcstrings at build time, so the
    # String Catalog stays in sync with the code as localization rolls out (#312).
    SWIFT_EMIT_LOC_STRINGS: YES
    # Marketing version + build number live in build settings (not Info.plist
    # literally) so Xcode's General → Identity panel reads them. The Info.plist
    # references them via $(MARKETING_VERSION) / $(CURRENT_PROJECT_VERSION).
    # CURRENT_PROJECT_VERSION is overwritten by ci_pre_xcodebuild.sh in Xcode
    # Cloud with $CI_BUILD_NUMBER so every distributed archive has a unique
    # build number.
    # Bumped to the in-progress version at the START of its work (see
    # AGENTS.md → Release process), not after — so staging/main always carry
    # the version currently being built.
    MARKETING_VERSION: "0.7.3"
    CURRENT_PROJECT_VERSION: "1"

packages:
  AetherCore:
    path: AetherCore
  # Official VideoLAN VLCKit, vendored locally (scripts/fetch_vlckit.sh) — the
  # fallback player for containers AVFoundation can't open (mkv). See #173.
  VLCKit:
    path: Vendor/VLCKit
  # Pure-Swift SMB2/3 client for browse + auth — replaces the VLCKit-based SMB
  # bridge, which was an undebuggable black box that failed on-device. Pure
  # Swift (no libsmb2 / no unsafe build flags → clean SPM, and Network-framework
  # sockets trigger the iOS Local Network prompt natively). See #213/#214.
  # VLCKit stays for MKV playback only.
  SMBClient:
    url: https://github.com/kishikawakatsumi/SMBClient
    from: 0.1.0

targets:
  # Single multiplatform target. One bundle ID
  # (`cz.zmrhal.aether`), one App Store Connect record, one TestFlight invite
  # that works across every Apple destination. Xcode picks the right asset
  # catalog variant (AppIcon.appiconset / AppIcon.brandassets /
  # AppIcon.solidimagestack) per destination at archive time.
  Aether:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
      - tvOS
      - visionOS
    sources:
      - path: Aether/Sources
      - path: Aether/Resources
        buildPhase: resources
        excludes:
          - ".gitkeep"
      # Reality Composer Pro cinema environments, bundled as an app resource
      # (NOT linked as a Swift package). realitytool compiles it at the app's own
      # deployment target — tvOS 26 satisfies its ≥19 requirement, which a
      # package can't declare (the SPM platform enum caps at tvOS 18). Authored
      # in Reality Composer Pro by opening `RealityKitContent`; loaded at runtime
      # from `Bundle.main`.
      - path: RealityKitContent/Sources/RealityKitContent/RealityKitContent.rkassets
        buildPhase: resources
    dependencies:
      - package: AetherCore
        product: AetherCore
      - package: VLCKit
        product: VLCKit
      - package: SMBClient
        product: SMBClient
    # Base xcconfig that pulls in the (gitignored) TMDb key — see Config/.
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    info:
      path: Aether/SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: Aether
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Clear per-build identifier (short git commit), stamped into the built
        # Info.plist by the "Stamp git commit" build phase below. Default "dev"
        # is what shows if the stamp ever fails to run. Surfaced in Settings →
        # About; unlike CFBundleVersion it's meaningful on local builds too.
        AetherGitCommit: dev
        # TMDb v3 API key for Local Library metadata matching (#210). Injected
        # from Config/Secrets.xcconfig (gitignored) / Xcode Cloud; empty in CI +
        # clean checkouts, which simply disables matching.
        TMDBAPIKey: "$(TMDB_API_KEY)"
        ITSAppUsesNonExemptEncryption: false
        # Required so iOS/visionOS may reach a NAS on the LAN for SMB browse +
        # playback (#214). tvOS ignores it. Without it the first connect silently
        # fails until the user allows Local Network in Settings ▸ Privacy.
        NSLocalNetworkUsageDescription: "Aether uses your local network to connect to media servers and SMB shares on your network."
        # iOS / iPadOS / visionOS read the launch screen + scene manifest;
        # tvOS ignores them harmlessly.
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # tvOS Top Shelf: point at the Brand Asset's imageset names. Without
        # this key the App Store Connect upload fails with code 90513
        # (Missing Info.plist Key TVTopShelfImage.TVTopShelfPrimaryImageWide).
        # Harmless on iOS / iPadOS / visionOS — those platforms ignore it.
        TVTopShelfImage:
          TVTopShelfPrimaryImage: Top Shelf Image
          TVTopShelfPrimaryImageWide: Top Shelf Image Wide
        # App Transport Security is relaxed because Aether's whole job is to
        # talk to media servers users host themselves. Most real-world setups
        # don't have valid TLS certs:
        # - Jellyfin / Emby on a NAS or Raspberry Pi typically runs over plain
        #   HTTP on the LAN.
        # - Synology DSM / Video Station ships with a self-signed cert.
        # - Plex is the rare exception (per-server `*.plex.direct` certs), but
        #   that's their proprietary infrastructure, not a general pattern.
        #
        # NSAllowsLocalNetworking alone isn't enough — users often reach their
        # server over a public hostname (DDNS, custom domain, Tailscale Magic
        # DNS) that ATS treats as "remote" even though it points at a private
        # IP. Per-domain exceptions can't enumerate user-entered hostnames.
        # NSAllowsArbitraryLoads matches Infuse / VLC / the official Jellyfin
        # app, and Apple accepts the justification for personal-media clients
        # at review time.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    # iCloud Key-Value Store — used by ResumeStore for cross-device resume
    # point sync (iPhone / iPad / Apple TV / Vision Pro share state via the
    # user's iCloud account). The entitlement identifier defaults to the team
    # identifier prefix + bundle identifier, which is what Apple's signing
    # infrastructure expects for a per-app KVS container.
    #
    # Apple-side step (one-time): in Apple Developer portal, the App ID
    # `cz.zmrhal.aether` must have "iCloud" capability enabled with
    # "Key-value storage" sub-service ticked.
    entitlements:
      path: Aether/SupportingFiles/Aether.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    # Stamp the short git commit into the built Info.plist's AetherGitCommit key,
    # so every build (local Xcode included, where CFBundleVersion is always "1")
    # carries a clear identifier. Runs against the checked-out repo, so it works
    # locally and on Xcode Cloud. Best-effort: falls back to "dev" if git is
    # unavailable, and never fails the build.
    postBuildScripts:
      - name: Stamp git commit
        basedOnDependencyAnalysis: false
        script: |
          set +e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$PLIST" ] || exit 0
          HASH=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null)
          [ -z "$HASH" ] && HASH="dev"
          if ! git -C "$SRCROOT" diff --quiet HEAD 2>/dev/null; then HASH="${HASH}+"; fi
          /usr/libexec/PlistBuddy -c "Set :AetherGitCommit ${HASH}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :AetherGitCommit string ${HASH}" "$PLIST"
          exit 0
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.zmrhal.aether
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8PW5FWH7P2
        SUPPORTS_MACCATALYST: NO
        # AppIcon is the canonical name; Xcode's asset compiler resolves
        # AppIcon.appiconset for iOS / iPadOS, AppIcon.brandassets for tvOS,
        # and AppIcon.solidimagestack for visionOS automatically.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Alternate app icons (Settings → App Icon picker, via setAlternateIconName).
        # iPhone/iPad only — alternate icons aren't supported on tvOS/visionOS,
        # and the alt sets are platform:ios, so these are SDK-scoped to iOS to
        # keep the tvOS/visionOS asset compile clean.
        "ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS[sdk=iphoneos*]": YES
        "ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS[sdk=iphonesimulator*]": YES
        "ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES[sdk=iphoneos*]": AppIconLight AppIconTinted
        "ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES[sdk=iphonesimulator*]": AppIconLight AppIconTinted
        # Surfaces "Aether" in Xcode's Identity → Display Name field. Also
        # generated into the per-destination Info.plist by Xcode.
        INFOPLIST_KEY_CFBundleDisplayName: Aether
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution

  # Native macOS app (#232) — player-first: open a video file and play it well.
  # Vertical slice for now (open + VLC playback); Finder file-association,
  # play-in-place bookmarks, and the rich player window follow as local-file
  # playback matures. Reuses AetherCore + VLCKit (macos slice); no UIKit.
  AetherMac:
    type: application
    platform: macOS
    sources:
      - path: AetherMac/Sources
      - path: AetherMac/Resources
    dependencies:
      - package: AetherCore
        product: AetherCore
      # libmpv — the engine behind IINA (#232). The macOS player uses mpv's
      # **software render API** and composites via **Metal** (MTKView), so there's
      # no OpenGL link (NSOpenGLView/OpenGL are deprecated — #19). Metal/MetalKit
      # auto-link from the Swift `import`. Headers + the `Cmpv` module map are
      # vendored in Vendor/Mpv; libmpv itself comes from Homebrew for dev builds
      # (run scripts/fetch_mpv.sh).
    # Register Aether as a video viewer so Finder offers "Open With ▸ Aether"
    # and the user can set it as the default player (#232 — the killer feature).
    # mkv has no system UTI, so we declare it as an imported type conforming to
    # public.movie; the standard movie/AV types cover mp4/mov/m4v/etc.
    info:
      path: AetherMac/SupportingFiles/Info.plist
      properties:
        # User-facing name is "Aether" everywhere (Dock, Finder, AND the menu
        # bar). The menu-bar title comes from CFBundleName, which defaults to the
        # product name "AetherMac" — pin it to Aether so it matches iOS. The Xcode
        # target stays "AetherMac" internally; only the visible name unifies.
        CFBundleName: Aether
        CFBundleDisplayName: Aether
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Short git commit, stamped into the built Info.plist by the "Stamp git
        # commit" phase below — the build identifier shown in Settings ▸ About
        # (CFBundleVersion is "1" on local builds). Default "dev" if git is absent.
        AetherGitCommit: dev
        # TMDb key baked in at build (from Config/App.xcconfig / Xcode Cloud).
        TMDBAPIKey: "$(TMDB_API_KEY)"
        # Supported UI languages — Czech + English (in-app switcher in Settings,
        # backed by Localizable.xcstrings). Lets the app run localized in cs.
        CFBundleLocalizations:
          - en
          - cs
        LSApplicationCategoryType: public.app-category.video
        CFBundleDocumentTypes:
          - CFBundleTypeName: Video
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - public.video
              - public.audiovisual-content
              - org.matroska.mkv
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: org.matroska.mkv
            UTTypeDescription: Matroska Video
            UTTypeConformsTo:
              - public.movie
            UTTypeTagSpecification:
              public.filename-extension:
                - mkv
    # Hardened-runtime entitlements (required for notarized Developer ID
    # distribution). The bundled mpv stack uses **LuaJIT**, which JIT-compiles, so
    # the hardened runtime needs allow-jit + allow-unsigned-executable-memory;
    # disable-library-validation lets the app load the bundled libmpv/ffmpeg dylibs
    # (re-signed with our cert in the post-build phase). Same set IINA uses.
    #
    # NB: NO iCloud entitlement — iCloud (KVS) is App-Store/TestFlight-only and
    # can't be used by a Developer-ID app, so macOS cross-device resume goes via
    # server-side progress instead (#18). It also can't be ad-hoc signed, which
    # was blocking the archive.
    entitlements:
      path: AetherMac/SupportingFiles/AetherMac.entitlements
      properties:
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
    # TMDb key for Local Library metadata matching (#210), injected from
    # Config/App.xcconfig (gitignored Secrets) / Xcode Cloud — same as iOS.
    # Empty in clean checkouts just disables matching; users can also set a key
    # manually in Settings.
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    # Make the .app self-contained: copy libmpv + its whole dependency tree
    # (ffmpeg/libass/…) into Contents/Frameworks and rewrite install names to
    # @executable_path/../Frameworks, so it runs on Macs without Homebrew (Xcode
    # Cloud archives, end users). dylibbundler comes from scripts/fetch_mpv.sh.
    postBuildScripts:
      # Stamp the short git commit into the built Info.plist (AetherGitCommit) so
      # the build carries a clear identifier even when CFBundleVersion is "1".
      # Best-effort: "dev" if git is unavailable; never fails the build.
      - name: Stamp git commit
        basedOnDependencyAnalysis: false
        script: |
          set +e
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$PLIST" ] || exit 0
          HASH=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null)
          [ -z "$HASH" ] && HASH="dev"
          if ! git -C "$SRCROOT" diff --quiet HEAD 2>/dev/null; then HASH="${HASH}+"; fi
          /usr/libexec/PlistBuddy -c "Set :AetherGitCommit ${HASH}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :AetherGitCommit string ${HASH}" "$PLIST"
          exit 0
      - name: Bundle libmpv into app
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Release/archive only — the Debug build's separate `.debug.dylib`
          # indirection breaks dylibbundler's load-command rewrite, and local
          # Debug runs fine against Homebrew's libmpv directly. Archives (Xcode
          # Cloud) are Release, where the bundle must be self-contained.
          if [ "${PLATFORM_NAME}" != "macosx" ] || [ "${CONFIGURATION}" != "Release" ]; then exit 0; fi
          if ! command -v dylibbundler >/dev/null 2>&1; then
            echo "error: dylibbundler not found — run scripts/fetch_mpv.sh"; exit 1
          fi
          BIN="${TARGET_BUILD_DIR}/${EXECUTABLE_PATH}"
          FW="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          mkdir -p "$FW"
          dylibbundler -of -cd -b -x "$BIN" -d "$FW" \
            -p "@executable_path/../Frameworks/" -i /usr/lib -i /System/Library
          # dylibbundler ad-hoc-signs the main binary; re-sign the bundled dylibs
          # with the real identity (Xcode signs the app bundle, not these). Dev
          # builds (signing off) just skip it and run unsigned locally.
          if [ "${CODE_SIGNING_ALLOWED}" != "NO" ] && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            find "$FW" -name "*.dylib" -print0 | while IFS= read -r -d '' lib; do
              codesign --force --timestamp --options runtime --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "$lib"
            done
          fi
    settings:
      base:
        # The Xcode target is "AetherMac" (must differ from the iOS "Aether"
        # target), but the shipped product is "Aether" — builds Aether.app with
        # an "Aether" executable, matching iOS. Only the scheme stays AetherMac.
        PRODUCT_NAME: Aether
        PRODUCT_BUNDLE_IDENTIFIER: cz.zmrhal.aether.mac
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8PW5FWH7P2
        # Hardened runtime — required for Apple notarization of the Developer ID
        # build. The app + bundled dylibs are signed with --options runtime.
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Dev slice: not sandboxed yet, so a user-picked / Finder-opened file
        # plays without security-scoped bookmarks. App Store sandbox +
        # play-in-place bookmarks come with the player-first work (#232).
        ENABLE_APP_SANDBOX: NO
        # libmpv: vendored headers + the `Cmpv` module map, dylib from Homebrew.
        # Apple Silicon only — Homebrew's libmpv (the player engine) ships arm64
        # only, so a universal/x86_64 slice can't link. The Mac app is arm64.
        ARCHS: arm64
        HEADER_SEARCH_PATHS: $(SRCROOT)/Vendor/Mpv/include
        LIBRARY_SEARCH_PATHS: /opt/homebrew/lib
        # -headerpad_max_install_names: leave room in the load commands so the
        # post-build dylibbundler phase can rewrite libmpv + deps to
        # @executable_path/../Frameworks (longer paths) without "doesn't fit".
        OTHER_LDFLAGS: -lmpv -Wl,-headerpad_max_install_names
        OTHER_SWIFT_FLAGS: -Xcc -fmodule-map-file=$(SRCROOT)/Vendor/Mpv/module.modulemap

  AetherTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AetherTests
    dependencies:
      - target: Aether
      - package: AetherCore
        product: AetherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.zmrhal.aether.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Aether:
    build:
      targets:
        Aether: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AetherTests
    archive:
      config: Release
  AetherMac:
    build:
      targets:
        AetherMac: all
    run:
      config: Debug
    archive:
      config: Release
